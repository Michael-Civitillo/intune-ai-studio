<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="url(#bg)"/>
  <text x="40" y="50" font-size="26" font-weight="700" fill="#1e293b">Authentication — Device Code Flow</text>
  <text x="40" y="76" font-size="14" fill="#64748b">No password touches the app. Tokens are delegated and held in memory only.</text>

  <!-- Lifelines / actors -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="220" height="46" rx="12" fill="url(#cyan)"/>
    <rect x="370" y="100" width="220" height="46" rx="12" fill="url(#violet)"/>
    <rect x="680" y="100" width="220" height="46" rx="12" fill="url(#emerald)"/>
  </g>
  <text x="170" y="129" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">FastAPI Backend</text>
  <text x="480" y="129" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">You + Browser</text>
  <text x="790" y="129" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Microsoft Entra ID</text>

  <g stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 5">
    <line x1="170" y1="150" x2="170" y2="520"/>
    <line x1="480" y1="150" x2="480" y2="520"/>
    <line x1="790" y1="150" x2="790" y2="520"/>
  </g>

  <!-- Steps -->
  <g font-size="12.5" fill="#334155">
    <!-- 1 -->
    <g stroke="#64748b" stroke-width="2" fill="none"><line x1="170" y1="190" x2="784" y2="190" marker-end="url(#arrow)"/></g>
    <circle cx="170" cy="190" r="13" fill="url(#cyan)"/><text x="170" y="194" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="200" y="184">initiate_device_flow — request user_code + verification_uri</text>

    <!-- 2 -->
    <g stroke="#64748b" stroke-width="2" fill="none"><line x1="790" y1="232" x2="176" y2="232" marker-end="url(#arrow)"/></g>
    <circle cx="790" cy="232" r="13" fill="url(#emerald)"/><text x="790" y="236" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="500" y="226" text-anchor="end">returns user_code + URL + polling interval</text>

    <!-- 3 -->
    <g stroke="#64748b" stroke-width="2" fill="none"><line x1="170" y1="274" x2="474" y2="274" marker-end="url(#arrow)"/></g>
    <circle cx="170" cy="274" r="13" fill="url(#cyan)"/><text x="170" y="278" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="200" y="268">UI shows the code &amp; sign-in link</text>

    <!-- 4 -->
    <g stroke="#64748b" stroke-width="2" fill="none"><line x1="480" y1="316" x2="784" y2="316" marker-end="url(#arrow)"/></g>
    <circle cx="480" cy="316" r="13" fill="url(#violet)"/><text x="480" y="320" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="510" y="310">open URL, enter code, sign in (MFA on Microsoft's servers)</text>

    <!-- 5 -->
    <g stroke="#64748b" stroke-width="2" fill="none"><line x1="170" y1="358" x2="784" y2="358" marker-end="url(#arrow)"/></g>
    <circle cx="170" cy="358" r="13" fill="url(#cyan)"/><text x="170" y="362" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="200" y="352">poll_device_flow — one non-blocking poll per tick</text>

    <!-- 6 -->
    <g stroke="#10b981" stroke-width="2.5" fill="none"><line x1="790" y1="400" x2="176" y2="400" marker-end="url(#arrow)"/></g>
    <circle cx="790" cy="400" r="13" fill="url(#emerald)"/><text x="790" y="404" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">6</text>
    <text x="500" y="394" text-anchor="end" font-weight="600" fill="#047857">access_token + delegated scopes</text>
  </g>

  <!-- Result card -->
  <g filter="url(#shadow)">
    <rect x="60" y="436" width="840" height="74" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="60" y="436" width="8" height="74" rx="4" fill="url(#emerald)"/>
  </g>
  <text x="86" y="466" font-size="14" font-weight="700" fill="#1e293b">7 · Token cached in memory</text>
  <text x="86" y="490" font-size="12.5" fill="#64748b">Held in a process-local dict — never written to disk. Cleared on sign-out or backend restart. Requires "Allow public client flows" on the Entra app.</text>
</svg>
