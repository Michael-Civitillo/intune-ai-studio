<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="560" fill="url(#bg)"/>
  <text x="40" y="52" font-size="26" font-weight="700" fill="#1e293b">Intune AI Studio — System Architecture</text>
  <text x="40" y="78" font-size="14" fill="#64748b">Local web app: React frontend → FastAPI backend → Microsoft &amp; AI cloud APIs</text>

  <!-- Browser column -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="240" height="380" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="40" y="110" width="240" height="56" rx="16" fill="url(#violet)"/>
    <rect x="40" y="150" width="240" height="16" fill="url(#violet)"/>
    <text x="60" y="145" font-size="17" font-weight="700" fill="#ffffff">Browser</text>
    <text x="60" y="183" font-size="12" fill="#64748b">React + TypeScript · Vite · :5173</text>
  </g>
  <g font-size="12.5" fill="#334155">
    <rect x="60" y="198" width="200" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="72" y="218">Pages (Dashboard, Sync, AI…)</text>
    <rect x="60" y="236" width="200" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="72" y="256">Components &amp; SSE stream view</text>
    <rect x="60" y="274" width="200" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="72" y="294">Axios API client</text>
    <rect x="60" y="312" width="200" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="72" y="332">Setup wizard + permissions</text>
  </g>
  <text x="60" y="372" font-size="11" fill="#94a3b8">Vite dev server proxies</text>
  <text x="60" y="388" font-size="11" fill="#94a3b8">/api/* → backend :8000</text>

  <!-- Backend column -->
  <g filter="url(#shadow)">
    <rect x="360" y="110" width="240" height="380" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="360" y="110" width="240" height="56" rx="16" fill="url(#cyan)"/>
    <rect x="360" y="150" width="240" height="16" fill="url(#cyan)"/>
    <text x="380" y="145" font-size="17" font-weight="700" fill="#ffffff">FastAPI Backend</text>
    <text x="380" y="183" font-size="12" fill="#64748b">Python · uvicorn · :8000</text>
  </g>
  <g font-size="12.5" fill="#334155">
    <rect x="380" y="198" width="200" height="34" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="392" y="220" font-weight="600">main.py</text><text x="392" y="234" font-size="10.5" fill="#64748b" display="none"></text>
    <text x="455" y="220" font-size="11" fill="#64748b">REST + SSE routes</text>
    <rect x="380" y="240" width="200" height="34" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="392" y="262" font-weight="600">auth.py</text>
    <text x="455" y="262" font-size="11" fill="#64748b">MSAL device flow</text>
    <rect x="380" y="282" width="200" height="34" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="392" y="304" font-weight="600">graph.py</text>
    <text x="455" y="304" font-size="11" fill="#64748b">Graph API calls</text>
    <rect x="380" y="324" width="200" height="34" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="392" y="346" font-weight="600">ai.py</text>
    <text x="455" y="346" font-size="11" fill="#64748b">Multi-provider AI</text>
  </g>
  <text x="380" y="392" font-size="11" fill="#94a3b8">Token cache in memory only</text>
  <text x="380" y="408" font-size="11" fill="#94a3b8">config.json (gitignored)</text>

  <!-- External services column -->
  <g filter="url(#shadow)">
    <rect x="700" y="130" width="220" height="100" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="700" y="130" width="8" height="100" rx="4" fill="url(#emerald)"/>
    <text x="724" y="166" font-size="15" font-weight="700" fill="#1e293b">Microsoft Entra ID</text>
    <text x="724" y="190" font-size="12" fill="#64748b">Device code sign-in</text>
    <text x="724" y="210" font-size="12" fill="#64748b">Delegated token issuance</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="700" y="250" width="220" height="100" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="700" y="250" width="8" height="100" rx="4" fill="url(#cyan)"/>
    <text x="724" y="286" font-size="15" font-weight="700" fill="#1e293b">Microsoft Graph API</text>
    <text x="724" y="310" font-size="12" fill="#64748b">v1.0 + beta endpoints</text>
    <text x="724" y="330" font-size="12" fill="#64748b">Devices · Groups · Health</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="700" y="370" width="220" height="100" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="700" y="370" width="8" height="100" rx="4" fill="url(#amber)"/>
    <text x="724" y="406" font-size="15" font-weight="700" fill="#1e293b">AI Providers</text>
    <text x="724" y="430" font-size="12" fill="#64748b">Anthropic · OpenAI</text>
    <text x="724" y="450" font-size="12" fill="#64748b">Azure OpenAI · Gemini</text>
  </g>

  <!-- Connectors -->
  <g stroke-width="2.5" fill="none">
    <path d="M280 300 H360" stroke="#8b5cf6"/>
    <path d="M600 300 H660 V180 H700" stroke="#10b981"/>
    <path d="M600 300 H700" stroke="#06b6d4"/>
    <path d="M600 300 H660 V420 H700" stroke="#f59e0b"/>
  </g>
  <g fill="#475569" font-size="10.5" font-weight="600">
    <circle cx="320" cy="300" r="3" fill="#8b5cf6"/>
    <text x="296" y="290">HTTP /api</text>
    <text x="612" y="172">MSAL</text>
    <text x="612" y="292">HTTPS</text>
    <text x="612" y="412">HTTPS</text>
  </g>
</svg>
