<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#f43f5e"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#059669"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="460" fill="url(#bg)"/>
  <text x="40" y="50" font-size="26" font-weight="700" fill="#1e293b">AI Device Search — NL → OData → Graph</text>
  <text x="40" y="76" font-size="14" fill="#64748b">Plain-English questions become a validated Graph OData filter, then a real device query.</text>

  <!-- Step cards -->
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="200" height="170" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="40" y="120" width="200" height="46" rx="16" fill="url(#s1)"/><rect x="40" y="150" width="200" height="16" fill="url(#s1)"/>
    <rect x="270" y="120" width="200" height="170" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="270" y="120" width="200" height="46" rx="16" fill="url(#s2)"/><rect x="270" y="150" width="200" height="16" fill="url(#s2)"/>
    <rect x="500" y="120" width="200" height="170" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="500" y="120" width="200" height="46" rx="16" fill="url(#s3)"/><rect x="500" y="150" width="200" height="16" fill="url(#s3)"/>
    <rect x="730" y="120" width="200" height="170" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="730" y="120" width="200" height="46" rx="16" fill="url(#s4)"/><rect x="730" y="150" width="200" height="16" fill="url(#s4)"/>
  </g>
  <g fill="#fff" font-size="14.5" font-weight="700">
    <text x="60" y="150">1 · Ask</text>
    <text x="290" y="150">2 · Translate</text>
    <text x="520" y="150">3 · Query</text>
    <text x="750" y="150">4 · Results</text>
  </g>
  <g font-size="12" fill="#475569">
    <text x="60" y="192">"Windows devices</text>
    <text x="60" y="210">not synced in</text>
    <text x="60" y="228">30 days"</text>
    <text x="60" y="262" font-size="11" fill="#94a3b8">free-text query</text>

    <text x="290" y="192">AI provider returns</text>
    <text x="290" y="210">strict JSON:</text>
    <text x="290" y="230" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#be123c">filter / select /</text>
    <text x="290" y="246" font-family="'SF Mono',Consolas,monospace" font-size="11" fill="#be123c">description</text>
    <text x="290" y="270" font-size="11" fill="#94a3b8">code fences stripped</text>

    <text x="520" y="192">GET managedDevices</text>
    <text x="520" y="210">?$filter=… $select=…</text>
    <text x="520" y="228">$top=100, paged</text>
    <text x="520" y="262" font-size="11" fill="#94a3b8">runs on your token</text>

    <text x="750" y="192">Device table +</text>
    <text x="750" y="210">the filter used</text>
    <text x="750" y="228">+ summary</text>
    <text x="750" y="262" font-size="11" fill="#94a3b8">bad filter → retry hint</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2.5" fill="none">
    <path d="M240 205 H270" marker-end="url(#arr)"/>
    <path d="M470 205 H500" marker-end="url(#arr)"/>
    <path d="M700 205 H730" marker-end="url(#arr)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="40" y="330" width="890" height="84" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="40" y="330" width="8" height="84" rx="4" fill="url(#s3)"/>
  </g>
  <text x="66" y="362" font-size="13.5" font-weight="700" fill="#1e293b">Guardrails</text>
  <text x="66" y="386" font-size="12.5" fill="#64748b">The AI only emits a filter — it never sees device data. The query runs read-only against Intune managed devices,</text>
  <text x="66" y="404" font-size="12.5" fill="#64748b">and a Graph rejection is caught and returned as a "rephrase your query" hint rather than an error.</text>
</svg>
