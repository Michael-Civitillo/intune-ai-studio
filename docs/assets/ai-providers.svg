<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="url(#bg)"/>
  <text x="40" y="50" font-size="26" font-weight="700" fill="#1e293b">AI Provider Abstraction</text>
  <text x="40" y="76" font-size="14" fill="#64748b">One internal interface (ai.py) → bring your own key for any of four providers.</text>

  <!-- Features (left) -->
  <g filter="url(#shadow)">
    <rect x="40" y="110" width="210" height="360" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="40" y="110" width="210" height="50" rx="16" fill="url(#violet)"/>
    <rect x="40" y="146" width="210" height="14" fill="url(#violet)"/>
  </g>
  <text x="60" y="142" font-size="15" font-weight="700" fill="#fff">AI Features</text>
  <g font-size="12.5" fill="#334155">
    <rect x="58" y="176" width="174" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="70" y="196">Device Search → OData</text>
    <rect x="58" y="214" width="174" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="70" y="234">Policy Explainer</text>
    <rect x="58" y="252" width="174" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="70" y="272">Script Generator</text>
    <rect x="58" y="290" width="174" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="70" y="310">Compliance Gaps</text>
    <rect x="58" y="328" width="174" height="30" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="70" y="348">Cleanup Advisor</text>
  </g>
  <text x="60" y="392" font-size="11" fill="#94a3b8">Streaming features emit</text>
  <text x="60" y="408" font-size="11" fill="#94a3b8">SSE token events to the UI.</text>

  <!-- Abstraction (middle) -->
  <g filter="url(#shadow)">
    <rect x="330" y="110" width="270" height="360" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="330" y="110" width="270" height="50" rx="16" fill="url(#cyan)"/>
    <rect x="330" y="146" width="270" height="14" fill="url(#cyan)"/>
  </g>
  <text x="350" y="142" font-size="15" font-weight="700" fill="#fff">ai.py — provider layer</text>
  <g font-size="12.5" fill="#334155">
    <rect x="350" y="178" width="230" height="56" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="364" y="200" font-weight="600">_resolve_provider()</text>
    <text x="364" y="220" font-size="11" fill="#64748b">config.json → legacy key → env var</text>
    <rect x="350" y="246" width="230" height="40" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="364" y="270" font-weight="600">_create_message() · non-streaming</text>
    <rect x="350" y="298" width="230" height="40" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="364" y="322" font-weight="600">_stream_message() · SSE tokens</text>
  </g>
  <text x="350" y="370" font-size="11.5" fill="#64748b">Default models per provider; key stored</text>
  <text x="350" y="388" font-size="11.5" fill="#64748b">locally in config.json (gitignored).</text>

  <!-- Providers (right) -->
  <g font-size="13" font-weight="600">
    <g filter="url(#shadow)"><rect x="700" y="130" width="220" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0"/><rect x="700" y="130" width="7" height="70" rx="3" fill="url(#amber)"/></g>
    <text x="724" y="162" fill="#1e293b">Anthropic — Claude</text><text x="724" y="184" font-size="11.5" font-weight="400" fill="#64748b">claude-sonnet-4-6</text>
    <g filter="url(#shadow)"><rect x="700" y="212" width="220" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0"/><rect x="700" y="212" width="7" height="70" rx="3" fill="url(#amber)"/></g>
    <text x="724" y="244" fill="#1e293b">OpenAI — GPT-4o</text><text x="724" y="266" font-size="11.5" font-weight="400" fill="#64748b">gpt-4o</text>
    <g filter="url(#shadow)"><rect x="700" y="294" width="220" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0"/><rect x="700" y="294" width="7" height="70" rx="3" fill="url(#amber)"/></g>
    <text x="724" y="326" fill="#1e293b">Azure OpenAI</text><text x="724" y="348" font-size="11.5" font-weight="400" fill="#64748b">your deployment + endpoint</text>
    <g filter="url(#shadow)"><rect x="700" y="376" width="220" height="70" rx="12" fill="#ffffff" stroke="#e2e8f0"/><rect x="700" y="376" width="7" height="70" rx="3" fill="url(#amber)"/></g>
    <text x="724" y="408" fill="#1e293b">Google — Gemini</text><text x="724" y="430" font-size="11.5" font-weight="400" fill="#64748b">gemini-2.5-flash</text>
  </g>

  <!-- connectors -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M250 290 H330" marker-end="url(#arr)"/>
    <path d="M600 250 H650 V165 H700" marker-end="url(#arr)"/>
    <path d="M600 290 H700" marker-end="url(#arr)"/>
    <path d="M600 290 H650 V329 H700" marker-end="url(#arr)"/>
    <path d="M600 290 H650 V411 H700" marker-end="url(#arr)"/>
  </g>
</svg>
