<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06b6d4"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#f43f5e"/></linearGradient>
    <linearGradient id="p4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#059669"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <text x="40" y="50" font-size="26" font-weight="700" fill="#1e293b">Force Sync — Streaming Pipeline</text>
  <text x="40" y="76" font-size="14" fill="#64748b">Batched Graph calls; per-device progress streamed to the UI over Server-Sent Events.</text>

  <!-- 4 phase cards -->
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="200" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="40" y="120" width="200" height="46" rx="16" fill="url(#p1)"/><rect x="40" y="150" width="200" height="16" fill="url(#p1)"/>
    <rect x="270" y="120" width="200" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="270" y="120" width="200" height="46" rx="16" fill="url(#p2)"/><rect x="270" y="150" width="200" height="16" fill="url(#p2)"/>
    <rect x="500" y="120" width="200" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="500" y="120" width="200" height="46" rx="16" fill="url(#p3)"/><rect x="500" y="150" width="200" height="16" fill="url(#p3)"/>
    <rect x="730" y="120" width="200" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="730" y="120" width="200" height="46" rx="16" fill="url(#p4)"/><rect x="730" y="150" width="200" height="16" fill="url(#p4)"/>
  </g>

  <g fill="#fff" font-size="14.5" font-weight="700">
    <text x="60" y="150">1 · Discover</text>
    <text x="290" y="150">2 · Resolve</text>
    <text x="520" y="150">3 · Sync</text>
    <text x="750" y="150">4 · Done</text>
  </g>
  <g font-size="12" fill="#475569">
    <text x="60" y="192">GET /groups/{id}</text>
    <text x="60" y="210">/members</text>
    <text x="60" y="232">Keep device-type</text>
    <text x="60" y="250">members only</text>

    <text x="290" y="192">$batch (≤20):</text>
    <text x="290" y="210">managedDevices?</text>
    <text x="290" y="228">$filter=azureAD</text>
    <text x="290" y="246">DeviceId eq …</text>

    <text x="520" y="192">$batch POST:</text>
    <text x="520" y="210">managedDevices/</text>
    <text x="520" y="228">{id}/syncDevice</text>
    <text x="520" y="250">204 = triggered</text>

    <text x="750" y="192">Emit summary:</text>
    <text x="750" y="210">total · synced ·</text>
    <text x="750" y="228">not_managed ·</text>
    <text x="750" y="246">errors</text>
  </g>

  <!-- arrows between -->
  <g stroke="#94a3b8" stroke-width="2.5" fill="none">
    <path d="M240 195 H270" marker-end="url(#arr)"/>
    <path d="M470 195 H500" marker-end="url(#arr)"/>
    <path d="M700 195 H730" marker-end="url(#arr)"/>
  </g>

  <!-- SSE stream bar -->
  <g filter="url(#shadow)">
    <rect x="40" y="330" width="890" height="160" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <text x="62" y="362" font-size="15" font-weight="700" fill="#1e293b">SSE event stream → browser (live per-device animation)</text>
  <g font-size="12" font-family="'SF Mono', Consolas, monospace">
    <rect x="62" y="380" width="180" height="34" rx="8" fill="#f5f3ff" stroke="#ddd6fe"/><text x="76" y="402" fill="#6d28d9">phase</text>
    <rect x="258" y="380" width="200" height="34" rx="8" fill="#ecfeff" stroke="#a5f3fc"/><text x="272" y="402" fill="#0e7490">devices_found</text>
    <rect x="474" y="380" width="220" height="34" rx="8" fill="#fff1f2" stroke="#fecdd3"/><text x="488" y="402" fill="#be123c">device_result ×N</text>
    <rect x="710" y="380" width="200" height="34" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/><text x="724" y="402" fill="#047857">complete</text>
  </g>
  <text x="62" y="446" font-size="12.5" fill="#64748b">Each managed device resolves and triggers independently, so results appear as they land — not after the whole batch finishes.</text>
  <text x="62" y="468" font-size="12.5" fill="#64748b">Devices not enrolled in Intune are reported as <tspan font-weight="600" fill="#be123c">not_managed</tspan> right after the resolve phase.</text>
</svg>
