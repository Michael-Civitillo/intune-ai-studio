<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wand" x1="350" y1="420" x2="200" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="tip" x1="160" y1="140" x2="210" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="sparkle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <linearGradient id="sparkle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="sparkle3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Wand stick (diagonal, bottom-right to upper-left) -->
  <line x1="370" y1="410" x2="215" y2="205" stroke="url(#wand)" stroke-width="22" stroke-linecap="round"/>

  <!-- Wand band / grip ring -->
  <line x1="290" y1="325" x2="275" y2="305" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- Wand tip glow (warm gold) -->
  <circle cx="205" cy="195" r="18" fill="url(#tip)" opacity="0.7"/>
  <circle cx="205" cy="195" r="10" fill="#ffffff" opacity="0.5"/>

  <!-- ✦ Main AI sparkle (4-pointed star) — large, top-left of wand tip -->
  <path d="M148 120 L156 148 L184 156 L156 164 L148 192 L140 164 L112 156 L140 148 Z"
        fill="url(#sparkle1)" opacity="0.95"/>

  <!-- ✦ Medium AI sparkle — upper right -->
  <path d="M280 90 L285 108 L303 113 L285 118 L280 136 L275 118 L257 113 L275 108 Z"
        fill="url(#sparkle2)" opacity="0.85"/>

  <!-- ✦ Small AI sparkle — right of wand -->
  <path d="M310 175 L313 187 L325 190 L313 193 L310 205 L307 193 L295 190 L307 187 Z"
        fill="url(#sparkle3)" opacity="0.8"/>

  <!-- ✦ Tiny sparkle — far upper left -->
  <path d="M100 80 L103 90 L113 93 L103 96 L100 106 L97 96 L87 93 L97 90 Z"
        fill="#ffffff" opacity="0.5"/>

  <!-- ✦ Tiny sparkle — between main and medium -->
  <path d="M220 105 L222 112 L229 114 L222 116 L220 123 L218 116 L211 114 L218 112 Z"
        fill="#fde68a" opacity="0.6"/>

  <!-- Small scatter dots (magic particles) -->
  <circle cx="170" cy="145" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="245" cy="135" r="3" fill="#fde68a" opacity="0.5"/>
  <circle cx="130" cy="170" r="3" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="195" cy="100" r="2.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="270" cy="155" r="2.5" fill="#e9d5ff" opacity="0.45"/>
  <circle cx="160" cy="95" r="2" fill="#fbbf24" opacity="0.4"/>
  <circle cx="325" cy="140" r="2" fill="#c4b5fd" opacity="0.35"/>
</svg>
